<!DOCTYPE html>
<html>
<head>
    <title>DEAD HAND 3D - FIXED ROOM</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #lobby { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: rgba(0,0,0,0.9); }
        .box-kode { border: 2px dashed #8ab4f8; padding: 20px; margin: 20px; border-radius: 10px; text-align: center; }
        .btn { padding: 15px 30px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; margin: 10px; }
        .btn-mabar { background: #8ab4f8; color: #000; }
        input { padding: 15px; border-radius: 20px; text-align: center; border: none; margin: 10px; width: 200px; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="lobby">
        <h1 style="color:red;">DEAD HAND 3D</h1>
        
        <div class="box-kode">
            <p style="margin:0; font-size:12px; color:#8ab4f8;">KODE ROOM ANDA:</p>
            <h2 id="display-kode" style="margin:10px 0;">BELUM ADA KODE</h2>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center;">
            <button class="btn btn-mabar" onclick="buatRuangan()">1. KLIK BUAT ROOM (DAPAT KODE)</button>
            
            <hr style="width:100%; border:0.5px solid #333; margin:20px 0;">
            
            <input type="text" id="room-code" placeholder="MASUKKAN KODE TEMAN">
            <button class="btn btn-mabar" style="background:#4CAF50;" onclick="gabungMabar()">2. KLIK GABUNG</button>
        </div>

        <p id="status-mandor" style="color:yellow; font-size:12px; margin-top:20px;">Status: Standby</p>
    </div>

    <script>
        // --- SETUP 3D (Agar ada gambarnya) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const geometry = new THREE.BoxGeometry(1, 0.5, 2);
        const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const pistol3D = new THREE.Mesh(geometry, material);
        scene.add(pistol3D);
        camera.position.z = 5;

        function animate() {
            requestAnimationFrame(animate);
            pistol3D.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();

        // --- LOGIKA ROOM & KODE (FIXED) ---
        const peer = new Peer(); 
        let conn;

        // FUNGSI BUAT ROOM (Dapetin Kode Otomatis)
        function buatRuangan() {
            // PeerJS otomatis buatin ID unik buat kamu
            const myId = peer.id; 
            document.getElementById('display-kode').innerText = myId;
            document.getElementById('status-mandor').innerText = "Status: Menunggu Teman...";
            alert("KODE BERHASIL DIBUAT! Kasih kode " + myId + " ke temenmu.");
        }

        // FUNGSI GABUNG (Masukin Kode Teman)
        function gabungMabar() {
            const code = document.getElementById('room-code').value;
            if(!code) return alert("Isi dulu kodenya, Pilot!");
            
            conn = peer.connect(code);
            setupKoneksi();
        }

        // Menunggu tamu datang
        peer.on('connection', (c) => {
            conn = c;
            setupKoneksi();
        });

        function setupKoneksi() {
            conn.on('open', () => {
                document.getElementById('lobby').style.display = 'none'; // Langsung masuk room
                alert("SINYAL TERKUNCI! MABAR DIMULAI.");
            });
        }
    </script>
</body>
</html>
